apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-go-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-go-api
  template:
    metadata:
      labels:
        app: secure-go-api
    spec:
      containers:
        - name: secure-go-api
          image: 
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: secure-go-api-svc
spec:
  type: NodePort
  selector:
    app: secure-go-api
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
